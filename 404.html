<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>홍승우</title>
  <!-- GitHub Pages SPA fallback (rafgraph/spa-github-pages style).
       GitHub Pages serves this 404 for any unknown path (e.g. /work/<slug> on a
       refresh/deep-link). We encode the path into a query and redirect to the root
       index.html, which decodes it back to a clean URL (see the <head> snippet in
       index.html) and the app opens that project. pathSegmentsToKeep = 0 because
       this is a user/root site (hongnoul.github.io), served at /. -->
  <script>
    var pathSegmentsToKeep = 0;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
