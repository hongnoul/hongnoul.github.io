<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Justin Hong</title>
  <meta name="description" content="Justin Hong.">
  <meta name="author" content="Justin Hong">
  <link rel="canonical" href="https://hongnoul.github.io/">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <meta property="og:title" content="Justin Hong">
  <meta property="og:description" content="Justin Hong.">
  <meta property="og:url" content="https://hongnoul.github.io/">
  <meta property="og:type" content="website">
  <meta name="theme-color" content="#ff2400">
  <style>
    html, body { margin: 0; background: #fff; }
    body {
      min-height: 100svh;
      display: flex;
      align-items: center;   /* both pieces vertically centered */
      overflow: hidden;
    }

    /* j.svg: scarlet square, flush left, maximum viewport height */
    .j {
      display: block;
      flex: none;
      height: min(100svh, 100vw);
      width: auto;
      background: #ff2400;
    }

    /* white area to the right of the j */
    .area {
      flex: 1 1 auto;
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 3×3 grid; only cell 2 (top-center) and cell 8 (bottom-center) get
       painted scarlet. The remaining 7 white cells are shaped like an H. */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      /* top row matches the j's stem height (118.53/203.2 = 58⅓% of the glyph);
         bottom row stays a square (⅓); middle row is whatever's left. */
      grid-template-rows: 42svh 1fr 33.333svh;
      height: 100svh;        /* full viewport height: top cell hugs the top, bottom cell the bottom */
      aspect-ratio: 1;
    }
    .grid span { background: #ff2400; }

    /* outer → inner: cell 2 grows from the top edge down, cell 8 from the bottom edge up */
    .grid .top {
      grid-area: 1 / 2 / 2 / 3;
      transform: scaleY(0); transform-origin: top;
      animation: grow 0.6s cubic-bezier(0.2, 0.7, 0.2, 1) forwards;
    }
    .grid .bottom {
      grid-area: 3 / 2 / 4 / 3;
      transform: scaleY(0); transform-origin: bottom;
      animation: grow 0.6s cubic-bezier(0.2, 0.7, 0.2, 1) forwards;
    }

    @keyframes grow { to { transform: scaleY(1); } }

    @media (prefers-reduced-motion: reduce) {
      .grid span { animation: none; transform: none; }
    }
  </style>
</head>
<body>
  <img class="j" src="/j.svg" alt="Justin Hong">
  <div class="area">
    <div class="grid" aria-hidden="true">
      <span class="top"></span>
      <span class="bottom"></span>
    </div>
  </div>
</body>
</html>
