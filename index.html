<!DOCTYPE html>
<html>
<head>
    <title>Justin Hong</title>
    <link rel="icon" type="image/png" href="src/images1.png">
    <link href="https://fonts.cdnfonts.com/css/public-pixel" rel="stylesheet">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'public pixel', sans-serif;
            color: white;
            background-color: #f94847;
        }
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .overlay-text {
            position: absolute;
            padding: 10px;
        }
        #contact {
            bottom: 0;
            left: 0;
            font-size: x-large; 
            text-align: left;
        }
        #contact a {
        color: white; /* Ensures the link is white */
        text-decoration: none; /* No underline by default */
        }

        #contact a:hover {
        text-decoration: underline; /* Underlines text on hover */
        cursor: pointer; /* Changes cursor to a hand pointer */
        }   
        #copyright {
            bottom: 0;
            right: 0;
            font-size: x-large;
            text-align: right;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div class="overlay-text" id="contact">
        <a href="mailto:namyang@mit.edu">namyang@mit.edu</a>
    </div>
    <div class="overlay-text" id="copyright">
        &copy; Justin Hong 2023
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
