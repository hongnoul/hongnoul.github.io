<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#000"/>
  <!-- top rule -->
  <line x1="80" y1="80" x2="1120" y2="80" stroke="#222" stroke-width="1"/>
  <!-- bottom rule -->
  <line x1="80" y1="550" x2="1120" y2="550" stroke="#222" stroke-width="1"/>
  <!-- title -->
  <text x="80" y="230"
    font-family="'Courier New', Courier, monospace"
    font-size="96" font-weight="700"
    fill="#f0f0f0" letter-spacing="-2">Justin Hong</text>
  <!-- sub -->
  <text x="80" y="310"
    font-family="'Courier New', Courier, monospace"
    font-size="28" font-weight="400"
    fill="#555">Founding Engineer · TrustAI</text>
  <!-- rule between sub and desc -->
  <line x1="80" y1="350" x2="320" y2="350" stroke="#333" stroke-width="1"/>
  <!-- desc -->
  <text x="80" y="390"
    font-family="'Courier New', Courier, monospace"
    font-size="28" font-weight="400"
    fill="#949494"><tspan x="80" dy="0">Writing on UI/UX and software.</tspan></text>
  <!-- domain -->
  <text x="1120" y="530"
    font-family="'Courier New', Courier, monospace"
    font-size="22" font-weight="400" text-anchor="end"
    fill="#333">hongnoul.github.io</text>
</svg>