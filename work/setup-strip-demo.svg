<svg xmlns="http://www.w3.org/2000/svg" width="720" height="300" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14" viewBox="0 0 720 300">
  <rect width="720" height="300" rx="8" fill="#0d1117"/>
  <text x="360" y="24" fill="#8b949e" font-size="12" text-anchor="middle">niri: the workspace is an infinite strip · the screen is a viewport</text>

  <!-- the strip: columns of windows scrolling left forever -->
  <clipPath id="clip"><rect x="16" y="40" width="688" height="220" rx="6"/></clipPath>
  <g clip-path="url(#clip)">
    <g>
      <animateTransform attributeName="transform" type="translate"
        values="0 0; 0 0; -176 0; -176 0; -352 0; -352 0; -528 0; -528 0; 0 0"
        keyTimes="0; 0.18; 0.24; 0.42; 0.48; 0.66; 0.72; 0.94; 1"
        dur="12s" repeatCount="indefinite" calcMode="spline"
        keySplines="0.33 1 0.68 1; 0.33 1 0.68 1; 0.33 1 0.68 1; 0.33 1 0.68 1; 0.33 1 0.68 1; 0.33 1 0.68 1; 0.33 1 0.68 1; 0.33 1 0.68 1"/>

      <!-- col 1: jcode home -->
      <rect x="16" y="40" width="168" height="220" fill="#161b22" stroke="#30363d"/>
      <text x="28" y="62" fill="#7ee787" font-size="11">jcode · home</text>
      <text x="28" y="84" fill="#8b949e" font-size="10">&gt; fix the nav overlap</text>
      <rect x="28" y="96" width="120" height="6" rx="3" fill="#21262d"/>
      <rect x="28" y="108" width="96" height="6" rx="3" fill="#21262d"/>
      <rect x="28" y="120" width="132" height="6" rx="3" fill="#21262d"/>
      <text x="28" y="150" fill="#79c0ff" font-size="10">✓ edited nav.css</text>
      <text x="28" y="166" fill="#79c0ff" font-size="10">✓ hwatu screenshot</text>
      <text x="28" y="242" fill="#484f58" font-size="10">alt+;</text>

      <!-- col 2: jcode project -->
      <rect x="192" y="40" width="168" height="220" fill="#161b22" stroke="#30363d"/>
      <text x="204" y="62" fill="#7ee787" font-size="11">jcode · beni-hana</text>
      <text x="204" y="84" fill="#8b949e" font-size="10">&gt; run the eval suite</text>
      <rect x="204" y="96" width="110" height="6" rx="3" fill="#21262d"/>
      <rect x="204" y="108" width="128" height="6" rx="3" fill="#21262d"/>
      <text x="204" y="138" fill="#e3b341" font-size="10">⏳ 34/60 tests…</text>
      <text x="204" y="242" fill="#484f58" font-size="10">alt+'</text>

      <!-- col 3: hwatu verification -->
      <rect x="368" y="40" width="168" height="220" fill="#161b22" stroke="#30363d"/>
      <text x="380" y="62" fill="#79c0ff" font-size="11">hwatu · localhost:3000</text>
      <rect x="380" y="76" width="144" height="80" rx="3" fill="#0d1117" stroke="#21262d"/>
      <rect x="388" y="86" width="60" height="8" rx="2" fill="#30363d"/>
      <rect x="388" y="102" width="128" height="5" rx="2" fill="#21262d"/>
      <rect x="388" y="112" width="112" height="5" rx="2" fill="#21262d"/>
      <rect x="388" y="128" width="44" height="14" rx="3" fill="#238636"/>
      <text x="380" y="176" fill="#8b949e" font-size="10">rendered, 13 ms</text>
      <text x="380" y="242" fill="#484f58" font-size="10">hwatu focus 3</text>

      <!-- col 4: jcode self-dev -->
      <rect x="544" y="40" width="168" height="220" fill="#161b22" stroke="#30363d"/>
      <text x="556" y="62" fill="#ff7b72" font-size="11">jcode · self-dev</text>
      <text x="556" y="84" fill="#8b949e" font-size="10">&gt; add a hotkey for…</text>
      <rect x="556" y="96" width="120" height="6" rx="3" fill="#21262d"/>
      <rect x="556" y="108" width="100" height="6" rx="3" fill="#21262d"/>
      <text x="556" y="138" fill="#79c0ff" font-size="10">✓ editing its harness</text>
      <text x="556" y="242" fill="#484f58" font-size="10">alt+shift+'</text>

      <!-- col 5 (wraps in) -->
      <rect x="720" y="40" width="168" height="220" fill="#161b22" stroke="#30363d"/>
      <text x="732" y="62" fill="#7ee787" font-size="11">jcode · home</text>
      <text x="732" y="84" fill="#8b949e" font-size="10">&gt; fix the nav overlap</text>
      <rect x="732" y="96" width="120" height="6" rx="3" fill="#21262d"/>
      <rect x="732" y="108" width="96" height="6" rx="3" fill="#21262d"/>
      <rect x="732" y="120" width="132" height="6" rx="3" fill="#21262d"/>
      <text x="732" y="150" fill="#79c0ff" font-size="10">✓ edited nav.css</text>
      <text x="732" y="242" fill="#484f58" font-size="10">alt+;</text>
    </g>
  </g>

  <!-- viewport frame on top -->
  <rect x="16" y="40" width="688" height="220" rx="6" fill="none" stroke="#484f58" stroke-width="1.5"/>

  <text x="360" y="286" fill="#484f58" font-size="11" text-anchor="middle">columns never resize behind your back · agents get infinite room to the right</text>
</svg>
